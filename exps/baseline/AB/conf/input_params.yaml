# Comprehensive example input parameters for CP-HOSfing predictors
dataset_caltest_path: /mnt/netapp2/Store_uni/home/ulc/co/rpj/projects/CP-HOSfing/data/lastovicka2023/lastovicka_2023_passiveOSRevisited_CALTEST.csv
maps_path: /mnt/netapp2/Store_uni/home/ulc/co/rpj/projects/CP-HOSfing/data/lastovicka2023/maps.plk
artifacts_path: /home/ulc/co/rpj/projects/CP-HOSfing/exps/predictors/artifacts
seed: 42

# GPU Configuration
use_amp: true              # Enable automatic mixed precision training
num_workers: 4             # Number of data loading workers (0 for CPU, 4+ for GPU)
use_multi_gpu: true        # Enable multi-GPU training with DataParallel

# Experiment selection
baselines: ["A", "B", "S-CP"]

# Split proportions for Cal/Test (70% already used for Train)
split_proportions:
  cal: 0.5
  test: 0.5

# S-CP
scp_m: 1000  # Maximum number of nodes in prediction set (default: 4)

# DEBUGGING
# FALSE
# num_runs: 10
# alphas: [0.02, 0.05, 0.10, 0.15, 0.20, 0.25]
num_runs: 1
alphas: [0.02, 0.15]
debug: False
dataset_frac: 1
debug_min_class_count: 0
# TRUE
# num_runs: 2
# alphas: [0.0, 0.05]
# debug: True
# dataset_frac: 0.2
# debug_min_class_count: 2